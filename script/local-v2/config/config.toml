# ABCore v2 – Local Parlia devnet node config
# Shared by all validator containers. Each container has its own /data volume.
# Chain ID 7140, 3-second blocks, Parlia PoSA consensus.

[Eth]
NetworkId = 7140
SyncMode = "full"
NoPruning = false
DatabaseCache = 512
TrieCleanCache = 256
TrieDirtyCache = 256
TrieTimeout = 360000000000
EnablePreimageRecording = false

[Eth.Miner]
GasCeil = 40000000
GasPrice = 1000000000
Recommit = 10000000000

[Eth.GPO]
Blocks = 20
Percentile = 60
OracleThreshold = 20

[Node]
DataDir = "/data"
InsecureUnlockAllowed = true
NoUSB = true
IPCPath = "geth.ipc"
HTTPHost = "0.0.0.0"
HTTPPort = 8545
HTTPVirtualHosts = ["*"]
HTTPModules = ["eth", "net", "web3", "debug", "parlia", "admin", "personal"]
WSHost = "0.0.0.0"
WSPort = 8546
WSModules = ["eth", "net", "web3", "debug", "parlia", "admin"]

[Node.P2P]
MaxPeers = 25
NoDiscovery = false
ListenAddr = ":30303"
EnableMsgEvents = false

[Node.HTTPTimeouts]
ReadTimeout = 30000000000
WriteTimeout = 30000000000
IdleTimeout = 120000000000
