name: Lint

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - '**/*.go'
              - 'go.sum'
              - 'go.mod'
              - '.golangci.yml'

  lint:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    strategy:
      matrix:
        go-version: [1.25.x]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Checkout code
      uses: actions/checkout@v4

    - uses: actions/cache@v4
      with:
        # In order:
        # * Module download cache
        # * Build cache (Linux)
        # * Build cache (Mac)
        # * Build cache (Windows)
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
          ~/Library/Caches/go-build
          ~\AppData\Local\go-build
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - run: |
        go mod tidy

    - name: golangci-lint
      env:
        CGO_CFLAGS: "-O -D__BLST_PORTABLE__"
        CGO_CFLAGS_ALLOW: "-O -D__BLST_PORTABLE__"
        ANDROID_HOME: "" # Skip android test
      run: |
        make lint

  lint-status:
    name: lint-status
    needs:
      - changes
      - lint
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Finalize Lint status
      run: |
        if [ "${{ needs.changes.outputs.src }}" != "true" ]; then
          echo "Lint not required for this change set."
          exit 0
        fi

        if [ "${{ needs.lint.result }}" != "success" ]; then
          echo "Lint result: ${{ needs.lint.result }}"
          exit 1
        fi

        echo "Lint passed."
