name: Integration Test

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - '**/*.go'
              - 'go.sum'
              - 'go.mod'
              - 'docker/**'
              - 'Dockerfile*'
              - 'tests/truffle/**'
              - 'Makefile'

  integration-test:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Truffle test
      run: |
        make truffle-test

  integration-test-status:
    name: integration-test-status
    needs:
      - changes
      - integration-test
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Finalize Integration Test status
      run: |
        if [ "${{ needs.changes.outputs.src }}" != "true" ]; then
          echo "Integration Test not required for this change set."
          exit 0
        fi

        if [ "${{ needs.integration-test.result }}" != "success" ]; then
          echo "Integration Test result: ${{ needs.integration-test.result }}"
          exit 1
        fi

        echo "Integration Test passed."
