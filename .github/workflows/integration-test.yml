name: Integration Test

on:
  push:
    branches: 
      - master

  pull_request:
    branches:
      - master

  workflow_dispatch:

jobs:
  truffle-test:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Truffle test
      run: |
        make truffle-test
