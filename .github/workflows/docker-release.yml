name: Docker

on:
  push:
    # Publish `v1.2.3` tags as releases.
    tags:
      - v*
  workflow_dispatch:
    inputs:
      docker-tag:
        description: 'Docker image tag (e.g. v1.0.0) — defaults to short commit SHA'
        required: false
        default: ''
      push-docker:
        description: 'Push image to ghcr.io'
        required: false
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io
  REGISTRY_IMAGE: abfoundationglobal/abcore-v2

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            platform_pair: linux-amd64
          - os: ubuntu-24.04-arm
            platform_pair: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute tag
        id: tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ -n "${{ inputs.docker-tag }}" ]]; then
            echo "value=${{ inputs.docker-tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=${{ steps.tag.outputs.value }},enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.licenses=LGPL-3.0,GPL-3.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'workflow_dispatch' || inputs.push-docker
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.PACKAGE_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          outputs: type=image,push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'workflow_dispatch' || inputs.push-docker }}
          tags: ${{ env.REGISTRY }}/${{ env.REGISTRY_IMAGE }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Save image to tar
        run: |
          docker save \
            "${{ env.REGISTRY }}/${{ env.REGISTRY_IMAGE }}@${{ steps.build.outputs.digest }}" \
            -o /tmp/image-${{ matrix.platform_pair }}.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.platform_pair }}
          path: /tmp/image-${{ matrix.platform_pair }}.tar
          retention-days: 7

      - name: Export digest
        if: github.event_name != 'workflow_dispatch' || inputs.push-docker
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'workflow_dispatch' || inputs.push-docker
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform_pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build
    if: github.event_name != 'workflow_dispatch' || inputs.push-docker
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.PACKAGE_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute tag
        id: tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ -n "${{ inputs.docker-tag }}" ]]; then
            echo "value=${{ inputs.docker-tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=${{ steps.tag.outputs.value }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}
