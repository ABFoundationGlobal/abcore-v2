name: Docker Build

on:
  workflow_dispatch:
    inputs:
      docker-tag:
        description: 'Image tag (e.g. v1.0.0) — defaults to short commit SHA'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute tag
        id: tag
        env:
          DOCKER_TAG: ${{ inputs.docker-tag }}
        run: |
          if [[ -n "$DOCKER_TAG" ]]; then
            echo "value=$DOCKER_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: abcore-v2:${{ steps.tag.outputs.value }}
          outputs: type=docker,dest=/tmp/abcore-v2-${{ steps.tag.outputs.value }}.tar

      - name: Compress image tar
        run: gzip /tmp/abcore-v2-${{ steps.tag.outputs.value }}.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: abcore-v2-${{ steps.tag.outputs.value }}-docker
          path: /tmp/abcore-v2-${{ steps.tag.outputs.value }}.tar.gz
          retention-days: 7
