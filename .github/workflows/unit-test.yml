name: Unit Test

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - '**/*.go'
              - 'go.sum'
              - 'go.mod'
              - 'build/ci.go'

  unit-test:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    strategy:
      matrix:
        go-version: [1.25.x]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Checkout code
      uses: actions/checkout@v4

    - uses: actions/cache@v4
      with:
        # In order:
        # * Module download cache
        # * Build cache (Linux)
        # * Build cache (Mac)
        # * Build cache (Windows)
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
          ~/Library/Caches/go-build
          ~\AppData\Local\go-build
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Unit Test
      env:
        CGO_CFLAGS: "-O -D__BLST_PORTABLE__"
        CGO_CFLAGS_ALLOW: "-O -D__BLST_PORTABLE__"
        ANDROID_HOME: "" # Skip android test
      run: |
        # Skip known-flaky upstream tests that fail non-deterministically under -p 4:
        #   TestBroadcastBlock*     (eth/fetcher): uses 100ms goroutine scheduling
        #                           deadline — too tight on loaded CI runners.
        #   TestWalletNotifications (accounts/keystore): event-count race between
        #                           keystore watcher and unsubscribe under parallelism.
        # Re-enable when: (a) upstream tests are fixed to be timing-independent,
        # or (b) we switch to a dedicated/self-hosted runner with consistent scheduling.
        go run build/ci.go test -timeout 1h -p 4 -skip 'TestBroadcastBlock|TestWalletNotifications'
