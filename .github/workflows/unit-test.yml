name: Unit Test

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - '**/*.go'
              - 'go.sum'
              - 'go.mod'
              - 'build/ci.go'

  unit-test:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    strategy:
      matrix:
        go-version: [1.25.x]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Checkout code
      uses: actions/checkout@v6

    - uses: actions/cache@v4
      with:
        # In order:
        # * Module download cache
        # * Build cache (Linux)
        # * Build cache (Mac)
        # * Build cache (Windows)
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
          ~/Library/Caches/go-build
          ~\AppData\Local\go-build
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Unit Test
      env:
        CGO_CFLAGS: "-O -D__BLST_PORTABLE__"
        CGO_CFLAGS_ALLOW: "-O -D__BLST_PORTABLE__"
        ANDROID_HOME: "" # Skip android test
      run: |
        go run build/ci.go test -timeout 1h

  unit-test-status:
    name: unit-test-status
    needs:
      - changes
      - unit-test
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Finalize Unit Test status
      run: |
        if [ "${{ needs.changes.outputs.src }}" != "true" ]; then
          echo "Unit Test not required for this change set."
          exit 0
        fi

        if [ "${{ needs.unit-test.result }}" != "success" ]; then
          echo "Unit Test result: ${{ needs.unit-test.result }}"
          exit 1
        fi

        echo "Unit Test passed."
