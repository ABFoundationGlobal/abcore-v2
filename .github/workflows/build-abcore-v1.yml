name: Build abcore-v1

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'abcore repo ref (tag, branch, or commit SHA)'
        required: true
      docker-tag:
        description: 'Docker image tag pushed to Docker Hub (e.g. v1.13.15)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout abcore-v1
        uses: actions/checkout@v6
        with:
          repository: ABFoundationGlobal/abcore
          ref: ${{ inputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: abfoundation
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: abfoundation/abcore-v1:${{ inputs.docker-tag }}
