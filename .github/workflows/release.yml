name: Release

on:
  push:
    # Publish `v1.2.3` tags as releases.
    tags:
      - v*
env:
  CGO_CFLAGS: "-O -D__BLST_PORTABLE__"
  CGO_CFLAGS_ALLOW: "-O -D__BLST_PORTABLE__"

jobs:
  build:
    name: Build Release
    strategy:
      matrix:
        go-version: [1.25.x]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - uses: actions/cache@v4
        with:
          # In order:
          # * Module download cache
          # * Build cache (Linux)
          # * Build cache (Mac)
          # * Build cache (Windows)
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/Library/Caches/go-build
            ~\AppData\Local\go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # ==============================
      #       Linux/Macos/Windows Build
      # ==============================

      - name: Build Binary for ${{matrix.os}}
        if: matrix.os == 'ubuntu-latest'
        run: |
          go mod download
          wget https://pub-c0627345c16f47ab858c9469133073a8.r2.dev/x86_64-linux-musl-cross.tgz
          tar -xvf ./x86_64-linux-musl-cross.tgz
          GIT_COMMIT=$(git rev-parse HEAD)
          GIT_COMMIT_DATE=$(git log -n1 --pretty='format:%cd' --date=format:'%Y%m%d')
          GOOS=linux GOARCH=amd64 CGO_ENABLED=1 CC=$(pwd)/x86_64-linux-musl-cross/bin/x86_64-linux-musl-gcc go build -ldflags "-X main.gitCommit=$GIT_COMMIT -X main.gitDate=$GIT_COMMIT_DATE -extldflags=-static" -o ./build/bin/geth -a ./cmd/geth

      # ==============================
      - name: Temporary replace BLS for Windows
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: go mod edit -replace=github.com/herumi/bls-eth-go-binary=github.com/herumi/bls-eth-go-binary@v0.0.0-20210917013441-d37c07cfda4e && go mod tidy

      - name: Build Binary for ${{matrix.os}}
        if: matrix.os != 'ubuntu-latest'
        run: |
          go mod download
          make geth

      # ==============================
      #       Cross Compile for ARM
      # ==============================

      - name: Build Binary for ARM
        if: matrix.os == 'ubuntu-latest'
        run: |
          go mod download
          wget https://pub-c0627345c16f47ab858c9469133073a8.r2.dev/aarch64-linux-musl-cross.tgz
          tar -xvf ./aarch64-linux-musl-cross.tgz
          GIT_COMMIT=$(git rev-parse HEAD)
          GIT_COMMIT_DATE=$(git log -n1 --pretty='format:%cd' --date=format:'%Y%m%d')
          GOOS=linux GOARCH=arm64 CGO_ENABLED=1 CC=$(pwd)/aarch64-linux-musl-cross/bin/aarch64-linux-musl-gcc go build -ldflags "-X main.gitCommit=$GIT_COMMIT -X main.gitDate=$GIT_COMMIT_DATE -extldflags=-static" -o ./build/bin/geth-linux-arm64 -a ./cmd/geth

      # ==============================
      #       Upload artifacts
      # ==============================

      - name: Upload Linux Build
        uses: actions/upload-artifact@v4.3.3
        if: matrix.os == 'ubuntu-latest'
        with:
          name: linux
          path: ./build/bin/geth

      - name: Upload MacOS Build
        uses: actions/upload-artifact@v4.3.3
        if: matrix.os == 'macos-latest'
        with:
          name: macos
          path: ./build/bin/geth

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4.3.3
        if: matrix.os == 'windows-latest'
        with:
          name: windows
          path: ./build/bin/geth.exe

      - name: Upload ARM-64 Build
        uses: actions/upload-artifact@v4.3.3
        if: matrix.os == 'ubuntu-latest'
        with:
          name: arm64
          path: ./build/bin/geth-linux-arm64

  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build image
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          docker build \
            -f docker/Dockerfile \
            --target bsc \
            -t "abfoundationglobal/abcore-v2:$TAG" \
            .

      - name: Save image tar
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          docker save "abfoundationglobal/abcore-v2:$TAG" \
            -o "/tmp/abcore-v2-$TAG-linux-amd64.tar"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/abcore-v2-*-linux-amd64.tar
          retention-days: 1

  release:
    name: Release
    needs: [build, build-image]
    runs-on: ubuntu-latest
    steps:
      - name: Set Env
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Checkout Code
        uses: actions/checkout@v4

      # ==============================
      #       Download artifacts
      # ==============================

      - name: Download Artifacts
        uses: actions/download-artifact@v4.1.7
        with:
          name: linux
          path: ./linux

      - name: Download Artifacts
        uses: actions/download-artifact@v4.1.7
        with:
          name: macos
          path: ./macos

      - name: Download Artifacts
        uses: actions/download-artifact@v4.1.7
        with:
          name: windows
          path: ./windows

      - name: Download Artifacts
        uses: actions/download-artifact@v4.1.7
        with:
          name: arm64
          path: ./arm64

      - name: Download Docker Image
        uses: actions/download-artifact@v4.1.7
        with:
          name: docker-image
          path: ./docker-image

      # ==============================
      #       Create release
      # ==============================
      - name: Generate Change Log
        id: changelog
        run: |
          chmod 755 ./.github/generate_change_log.sh
          CHANGELOG=$(./.github/generate_change_log.sh ${{ env.RELEASE_VERSION}})
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$CHANGELOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # Rename assets
      - run: |
          mv ./linux/geth ./linux/geth_linux
          mv ./macos/geth ./macos/geth_macos
          mv ./windows/geth.exe ./windows/geth_windows.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.RELEASE_VERSION}}
          release_name: ${{ env.RELEASE_VERSION}}
          body: |
            ${{ env.CHANGELOG }}
          draft: false
          prerelease: false
          files: |
            ./linux/geth_linux
            ./macos/geth_macos
            ./windows/geth_windows.exe
            ./arm64/geth-linux-arm64
            ./docker-image/abcore-v2-${{ env.RELEASE_VERSION }}-linux-amd64.tar
